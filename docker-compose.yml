services:

  api:
    build: .

    container_name: shs_voice_ai_api

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      - db

    command: >
      sh -c "
      echo 'Waiting for PostgreSQL...' &&
      sleep 10 &&
      python -m app.init_db &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000
      "

  db:
    image: postgres:16

    container_name: shs_voice_ai_db

    environment:
      POSTGRES_DB: shs_voice_agent
      POSTGRES_USER: shs_user
      POSTGRES_PASSWORD: shs_password

    ports:
      - '5432:5432'

    volumes:
      - postgres_data:/var/lib/postgresql/data


volumes:
  postgres_data: